<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sal y heridas</title>

<style>
body {
  margin: 0;
  background: #f5f0e8;
  color: #610202;
  font-family: Georgia, serif;
}

#app {
  max-width: 700px;
  margin: auto;
  padding: 50px 25px;
}

header {
  text-align: center;
  margin-bottom: 50px;
}

h1 {
  font-size: 3rem;
  font-style: italic;
  font-weight: normal;
}

.subtitle {
  color: #610202;
}

#chat {
  display: flex;
  flex-direction: column;
  gap: 25px;
}

.message {
  font-size: 1.2rem;
  line-height: 1.6;
}

.ai {
  align-self: flex-start;
}

.user {
  align-self: flex-end;
  color: #610202;
  font-style: italic;
  text-align: right;
}

.label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #610202;
  margin-bottom: 5px;
}

#input-area {
  margin-top: 40px;
  display: flex;
  gap: 10px;
  border-bottom: 1px solid #610202;
  padding-bottom: 10px;
}

#user-input {
  flex: 1;
  border: none;
  background: transparent;
  outline: none;
  font-size: 1.1rem;
  font-family: Georgia, serif;
}

button {
  background: transparent;
  border: none;
  cursor: pointer;
  color: #610202;
  font-weight: bold;
}

.poem-card {
  margin-top: 20px;
  padding: 25px;
  border-left: 3px solid #610202;
  background: rgba(196, 87, 42, 0.08);
}

.poem-title {
  color: #c4572a;
  text-transform: uppercase;
  letter-spacing: 2px;
  font-size: 0.8rem;
  margin-bottom: 15px;
}

.poem-text {
  white-space: pre-line;
  font-style: italic;
  line-height: 1.8;
}
</style>
</head>

<body>

<div id="app">
  <header>
    <h1> Sal e idas,</h1>
    <h1> Sal y heridas</h1>
    <p class="subtitle">Todos tenemos sales, explora la tuya.</p>
  </header>

  <div id="chat"></div>

  <div id="input-area">
    <input id="user-input" placeholder="escribe aquí...">
    <button id="send-btn">enviar</button>
  </div>
</div>

<script>
const poems = [
  {
    title: "Poema del amor primero",
    text: `Hay amores que llegan
como la lluvia de mayo,
sin permiso,
sin aviso.

Y uno los recibe igual,
con las manos abiertas
y el pecho descubierto.`
  },
  {
    title: "Poema de la pérdida",
    text: `Aprendí a nombrar el vacío
con tu nombre.

Ahora cada cuarto
tiene una puerta que da
hacia donde tú solías ser.`
  },
  {
    title: "Poema del miedo",
    text: `El miedo no tiene cara,
por eso lo veo en todas partes.

Pero también aprendí
que no todo lo que tiembla
se rompe.`
  }
];

const questions = [
  "¿Cuál es tu sal?",
  "¿Hay alguien o algo que todavía recuerdes mucho?",
  "¿Ese recuerdo se siente más como amor, pérdida o miedo?"
];

let step = 0;

const chat = document.getElementById("chat");
const input = document.getElementById("user-input");
const button = document.getElementById("send-btn");

function addMessage(type, text) {
  const div = document.createElement("div");
  div.className = "message " + type;

  div.innerHTML = `
    <div class="label">${type === "ai" ? "poemario" : "tú"}</div>
    <div>${text}</div>
  `;

  chat.appendChild(div);
  window.scrollTo(0, document.body.scrollHeight);
}

function showPoem() {
  const poem = poems[Math.floor(Math.random() * poems.length)];

  addMessage("ai", "Creo que este poema puede acompañar lo que escribiste.");

  const card = document.createElement("div");
  card.className = "poem-card";

  card.innerHTML = `
    <div class="poem-title">${poem.title}</div>
    <div class="poem-text">${poem.text}</div>
  `;

  chat.appendChild(card);
  window.scrollTo(0, document.body.scrollHeight);
}

function sendMessage() {
  const text = input.value.trim();

  if (text === "") return;

  addMessage("user", text);
  input.value = "";

  setTimeout(() => {
    if (step < questions.length) {
      addMessage("ai", questions[step]);
      step++;
    } else {
      showPoem();
    }
  }, 600);
}

button.addEventListener("click", sendMessage);

input.addEventListener("keydown", function(event) {
  if (event.key === "Enter") {
    sendMessage();
  }
});

addMessage("ai", questions[0]);
step++;
</script>

</body>
</html>
